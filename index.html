<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Football Live Wallpaper</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: system-ui, sans-serif;
        }
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #ui-layer {
            position: fixed;
            top: 20px; left: 20px;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.6s ease;
        }
        #ui-layer.hidden { opacity: 0; pointer-events: none; }
        .btn {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: rgba(255,255,255,0.22); }
        .btn:active { transform: scale(0.96); }
        #score-board {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 10px 32px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.85;
            z-index: 99;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <button class="btn" id="fullscreenBtn">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        Fullscreen
    </button>
    <button class="btn" id="downloadBtn">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm9 4H3v-2h18v2z"/></svg>
        Download
    </button>
</div>

<div id="score-board">Football Live Wallpaper &nbsp;|&nbsp; PC Edition</div>
<div id="canvas-container"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const BALL_COUNT    = 18;
const GRAVITY       = 0.005;
const BOUNCE        = 1.01;
const SPEED_LIMIT   = 0.28;
const BALL_RADIUS   = 0.9;

// ── SCENE ───────────────────────────────────────────────────────
const scene    = new THREE.Scene();
scene.fog      = new THREE.FogExp2(0x0a1628, 0.045);

const camera   = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 0, 22);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// ── BACKGROUND GRADIENT ─────────────────────────────────────────
const bgScene  = new THREE.Scene();
const bgCam    = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const bgGeo    = new THREE.PlaneGeometry(2, 2);
const bgMat    = new THREE.ShaderMaterial({
    depthWrite: false,
    uniforms: { time: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position,1.0); }`,
    fragmentShader: `
        varying vec2 vUv;
        uniform float time;
        void main(){
            vec3 c1 = vec3(0.04, 0.10, 0.22);
            vec3 c2 = vec3(0.0, 0.22, 0.10);
            vec3 c3 = vec3(0.02, 0.04, 0.12);
            float t = vUv.y + sin(vUv.x * 3.0 + time * 0.3) * 0.06;
            vec3 col = mix(c3, mix(c1, c2, vUv.x + sin(time*0.2)*0.1), t);
            gl_FragColor = vec4(col, 1.0);
        }
    `
});
bgScene.add(new THREE.Mesh(bgGeo, bgMat));

// ── STADIUM LIGHTS ──────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x8ab4d0, 0.6));

const spotColors = [0xfff5cc, 0xccdfff, 0xfff5cc, 0xccdfff];
const spotPositions = [[-14, 12, 4], [14, 12, 4], [-14, -6, -4], [14, -6, -4]];
spotPositions.forEach((pos, i) => {
    const spot = new THREE.SpotLight(spotColors[i], 1.8, 60, Math.PI / 6, 0.4, 1.2);
    spot.position.set(...pos);
    spot.castShadow = true;
    spot.shadow.mapSize.set(1024, 1024);
    scene.add(spot);
    scene.add(spot.target);
});

// ── PITCH FLOOR ─────────────────────────────────────────────────
function createPitchTexture() {
    const c = document.createElement('canvas');
    c.width = 1024; c.height = 512;
    const ctx = c.getContext('2d');
    const stripes = 12;
    for (let i = 0; i < stripes; i++) {
        ctx.fillStyle = i % 2 === 0 ? '#1a5c28' : '#1e6b2f';
        ctx.fillRect(i * (1024 / stripes), 0, 1024 / stripes, 512);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 6;
    ctx.strokeRect(30, 30, 964, 452);
    ctx.beginPath(); ctx.moveTo(512, 30); ctx.lineTo(512, 482); ctx.stroke();
    ctx.beginPath(); ctx.arc(512, 256, 80, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(512, 256, 6, 0, Math.PI * 2);
    ctx.fillStyle = 'white'; ctx.fill();
    return new THREE.CanvasTexture(c);
}

const pitchMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(38, 20),
    new THREE.MeshStandardMaterial({ map: createPitchTexture(), roughness: 0.9 })
);
pitchMesh.rotation.x = -Math.PI / 2;
pitchMesh.position.y = -8;
pitchMesh.receiveShadow = true;
scene.add(pitchMesh);

// ── STARS / PARTICLES ───────────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const starCount = 300;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
    starPos[i * 3]     = (Math.random() - 0.5) * 80;
    starPos[i * 3 + 1] = (Math.random() - 0.5) * 40;
    starPos[i * 3 + 2] = -20 + Math.random() * -30;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const stars = new THREE.Points(
    starGeo,
    new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.6 })
);
scene.add(stars);

// ── FOOTBALL TEXTURE ────────────────────────────────────────────
function createFootballTexture() {
    const c = document.createElement('canvas');
    c.width = c.height = 512;
    const ctx = c.getContext('2d');

    const grad = ctx.createRadialGradient(200, 180, 20, 256, 256, 256);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(1, '#cccccc');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 512, 512);

    ctx.fillStyle = '#111111';
    const patches = [
        [256,256,58],[140,148,44],[372,148,44],
        [88,308,44],[424,308,44],[200,424,44],[312,424,44],
        [256,58,40],[58,200,38],[454,200,38],[148,470,36],[364,470,36]
    ];
    patches.forEach(([x,y,r]) => {
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
            const a = (i * 2 * Math.PI / 5) - Math.PI / 2;
            i === 0 ? ctx.moveTo(x + r*Math.cos(a), y + r*Math.sin(a))
                    : ctx.lineTo(x + r*Math.cos(a), y + r*Math.sin(a));
        }
        ctx.closePath(); ctx.fill();
    });

    ctx.strokeStyle = '#444'; ctx.lineWidth = 3;
    [[256,198,200,282],[256,198,312,282],[200,282,140,185],
     [312,282,372,185],[200,282,148,380],[312,282,364,380]].forEach(([x1,y1,x2,y2]) => {
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    });
    return new THREE.CanvasTexture(c);
}

const ballTex = createFootballTexture();
const ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 40, 40);

// ── BOX LIMITS ──────────────────────────────────────────────────
const box = { x: 1, y: 1, z: 6 };
function setupBox() {
    const vFOV  = THREE.MathUtils.degToRad(camera.fov);
    const h     = 2 * Math.tan(vFOV / 2) * camera.position.z;
    box.x = (h * camera.aspect) / 2;
    box.y = h / 2;
    balls && balls.forEach(b => {
        b.position.x = THREE.MathUtils.clamp(b.position.x, -(box.x - BALL_RADIUS), box.x - BALL_RADIUS);
        b.position.y = THREE.MathUtils.clamp(b.position.y, -(box.y - BALL_RADIUS), box.y - BALL_RADIUS);
    });
}
setupBox();

// ── BALLS ───────────────────────────────────────────────────────
const balls = [];
for (let i = 0; i < BALL_COUNT; i++) {
    const b = new THREE.Mesh(
        ballGeo,
        new THREE.MeshStandardMaterial({ map: ballTex, roughness: 0.3, metalness: 0.05 })
    );
    b.castShadow = b.receiveShadow = true;
    b.position.set(
        (Math.random() - 0.5) * box.x * 1.6,
        (Math.random() - 0.5) * box.y * 1.6,
        (Math.random() - 0.5) * box.z * 1.6
    );
    const speed = 0.07 + Math.random() * 0.09;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.random() * Math.PI;
    b.userData.vel = new THREE.Vector3(
        speed * Math.sin(phi) * Math.cos(theta),
        speed * Math.sin(phi) * Math.sin(theta),
        speed * Math.cos(phi) * 0.3
    );
    scene.add(b);
    balls.push(b);
}

// ── PHYSICS ─────────────────────────────────────────────────────
const grav = new THREE.Vector3(0, -GRAVITY, 0);

function physics() {
    balls.forEach((b, i) => {
        const v = b.userData.vel;
        v.addScaledVector(grav, 1);
        if (v.length() > SPEED_LIMIT) v.multiplyScalar(0.97);
        b.position.add(v);

        const lx = box.x - BALL_RADIUS, ly = box.y - BALL_RADIUS, lz = box.z - BALL_RADIUS;
        if (b.position.x >  lx) { b.position.x =  lx; v.x *= -BOUNCE; }
        if (b.position.x < -lx) { b.position.x = -lx; v.x *= -BOUNCE; }
        if (b.position.y >  ly) { b.position.y =  ly; v.y *= -BOUNCE; }
        if (b.position.y < -ly) { b.position.y = -ly; v.y *= -BOUNCE; }
        if (b.position.z >  lz) { b.position.z =  lz; v.z *= -BOUNCE; }
        if (b.position.z < -lz) { b.position.z = -lz; v.z *= -BOUNCE; }

        for (let j = i + 1; j < balls.length; j++) {
            const b2   = balls[j];
            const dv   = b.position.clone().sub(b2.position);
            const dist = dv.length();
            if (dist < BALL_RADIUS * 2 && dist > 0.001) {
                const n  = dv.normalize();
                const rv = v.clone().sub(b2.userData.vel);
                const d  = rv.dot(n);
                if (d < 0) {
                    const imp = n.clone().multiplyScalar(d * BOUNCE);
                    v.sub(imp);
                    b2.userData.vel.add(imp);
                    const ov = (BALL_RADIUS * 2 - dist) / 2;
                    b.position.addScaledVector(n,  ov);
                    b2.position.addScaledVector(n, -ov);
                }
            }
        }

        b.rotation.x += v.y * 0.28;
        b.rotation.z -= v.x * 0.28;
    });
}

// ── EVENTS ──────────────────────────────────────────────────────
let uiTimer;
function showUI() {
    document.getElementById('ui-layer').classList.remove('hidden');
    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => document.getElementById('ui-layer').classList.add('hidden'), 3000);
}

window.addEventListener('mousemove', e => {
    showUI();
    grav.x =  ((e.clientX / innerWidth)  - 0.5) * 0.035;
    grav.y = -GRAVITY + ((e.clientY / innerHeight) - 0.5) * -0.025;
});

window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    setupBox();
});

document.getElementById('fullscreenBtn').onclick = () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
};

document.getElementById('downloadBtn').onclick = () => {
    const a = document.createElement('a');
    a.href = 'data:text/html;charset=utf-8,' + encodeURIComponent(document.documentElement.outerHTML);
    a.download = 'Football_Live_Wallpaper.html';
    a.click();
};

// ── AUTO FULLSCREEN (PC) ─────────────────────────────────────────
document.addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
}, { once: true });

// ── ANIMATE ─────────────────────────────────────────────────────
let clock = 0;
function animate() {
    requestAnimationFrame(animate);
    clock += 0.01;
    bgMat.uniforms.time.value = clock;
    stars.rotation.z += 0.0002;
    physics();
    renderer.autoClear = false;
    renderer.clear();
    renderer.render(bgScene, bgCam);
    renderer.render(scene, camera);
}

animate();
showUI();
</script>
</body>
</html>
